<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Dashboard IA – Thai Union</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1117; color: #fff; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a4a;
    }
    .header-left h1 { font-size: 20px; font-weight: 600; }
    .header-left p { font-size: 12px; color: #888; margin-top: 2px; }
    .user-badge {
      background: #2a2a4a;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      color: #aaa;
    }
    .login-btn {
      background: #0078d4;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .login-btn:hover { background: #006cbd; }

    .stats {
      display: flex;
      gap: 12px;
      padding: 20px 30px;
    }
    .stat-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px 20px;
      flex: 1;
      border: 1px solid #2a2a4a;
      text-align: center;
    }
    .stat-num { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
    .num-total { color: #4fc3f7; }
    .num-critique { color: #ef5350; }
    .num-assurance { color: #ff9800; }
    .num-reunion { color: #66bb6a; }

    .filters {
      padding: 0 30px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #4fc3f7; color: #4fc3f7; }
    .filter-btn.active { background: #0078d4; color: white; border-color: #0078d4; }

    .email-list {
      padding: 0 30px 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .email-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px 20px;
      border: 1px solid #2a2a4a;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 4px solid #2a2a4a;
    }
    .email-card:hover { border-color: #4fc3f7; transform: translateX(3px); }
    .email-card.critique { border-left-color: #ef5350; }
    .email-card.assurance { border-left-color: #ff9800; }
    .email-card.reunion { border-left-color: #66bb6a; }
    .email-card.invitation { border-left-color: #ab47bc; }
    .email-card.information { border-left-color: #4fc3f7; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .cat-badge {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-critique { background: #3a1a1a; color: #ef5350; }
    .badge-assurance { background: #3a2a1a; color: #ff9800; }
    .badge-reunion { background: #1a3a1a; color: #66bb6a; }
    .badge-invitation { background: #2a1a3a; color: #ab47bc; }
    .badge-information { background: #1a2a3a; color: #4fc3f7; }
    .badge-autre { background: #2a2a2a; color: #aaa; }

    .email-subject { font-size: 15px; font-weight: 600; color: #fff; flex: 1; }
    .email-time { font-size: 11px; color: #666; white-space: nowrap; }
    .email-from { font-size: 12px; color: #888; margin-bottom: 6px; }

    .email-preview {
      font-size: 13px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .resume-box {
      margin-top: 12px;
      background: #0f1117;
      border-radius: 8px;
      padding: 14px;
      border: 1px solid #2a2a4a;
      display: none;
    }
    .resume-box.visible { display: block; }
    .resume-title {
      font-size: 12px;
      color: #4fc3f7;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .resume-text { font-size: 13px; color: #ccc; line-height: 1.7; }
    .resume-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
    .resume-tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      background: #1a2a3a;
      color: #4fc3f7;
    }

    .loading-box {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    .loading-box .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2a4a;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 30px;
      text-align: center;
    }
    .login-screen h2 { font-size: 22px; margin-bottom: 10px; }
    .login-screen p { color: #888; font-size: 14px; margin-bottom: 30px; }
    .ms-login-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0078d4;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 500;
    }
    .ms-login-btn:hover { background: #006cbd; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📧 Email Dashboard IA</h1>
    <p>Thai Union – Analyse intelligente de vos emails</p>
  </div>
  <div id="header-right">
    <button class="login-btn" onclick="seConnecter()">Se connecter avec Microsoft</button>
  </div>
</div>

<div id="app">
  <div class="login-screen">
    <h2>Bienvenue sur votre Dashboard Email IA</h2>
    <p>Connectez-vous avec votre compte Microsoft Thai Union pour accéder à vos emails classés et résumés par l'IA.</p>
    <button class="ms-login-btn" onclick="seConnecter()">
      🔐 Se connecter avec Microsoft
    </button>
  </div>
</div>

<script>
  const CLIENT_ID = "VOTRE_CLIENT_ID_ICI";
  const TENANT_ID = "VOTRE_TENANT_ID_ICI";
  const SCOPES = ["Mail.Read", "User.Read"];

  let accessToken = null;
  let tousEmails = [];

  const msalConfig = {
    auth: {
      clientId: CLIENT_ID,
      authority: `https://login.microsoftonline.com/${TENANT_ID}`,
      redirectUri: window.location.origin + window.location.pathname
    }
  };

  async function seConnecter() {
    const authUrl = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?` +
      `client_id=${CLIENT_ID}` +
      `&response_type=token` +
      `&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}` +
      `&scope=${encodeURIComponent(SCOPES.join(" "))}` +
      `&response_mode=fragment`;
    window.location.href = authUrl;
  }

  function extraireToken() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    return params.get("access_token");
  }

  function categoriser(sujet, corps) {
    const texte = (sujet + " " + corps).toLowerCase();
    if (texte.includes("sinistre") || texte.includes("claim") || texte.includes("accident")) return "assurance";
    if (texte.includes("contrat") || texte.includes("juridique") || texte.includes("legal") || texte.includes("signature")) return "assurance";
    if (texte.includes("urgent") || texte.includes("critique") || texte.includes("immédiat")) return "critique";
    if (texte.includes("réunion") || texte.includes("meeting") || texte.includes("appel") || texte.includes("call")) return "reunion";
    if (texte.includes("invitation") || texte.includes("invite") || texte.includes("event")) return "invitation";
    return "information";
  }

  function priorite(categorie) {
    const ordre = { critique: 1, assurance: 2, reunion: 3, invitation: 4, information: 5, autre: 6 };
    return ordre[categorie] || 6;
  }

  async function chargerEmails() {
    document.getElementById("app").innerHTML = `
      <div class="loading-box">
        <div class="spinner"></div>
        <p>Chargement de vos emails...</p>
      </div>`;

    try {
      const response = await fetch("https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$top=50&$select=subject,from,receivedDateTime,bodyPreview,body,isRead&$orderby=receivedDateTime desc", {
        headers: { Authorization: `Bearer ${accessToken}` }
      });

      const data = await response.json();
      tousEmails = data.value.map(email => ({
        id: email.id,
        sujet: email.subject || "(Sans sujet)",
        de: email.from?.emailAddress?.name || email.from?.emailAddress?.address || "Inconnu",
        deEmail: email.from?.emailAddress?.address || "",
        date: new Date(email.receivedDateTime),
        apercu: email.bodyPreview || "",
        corps: email.body?.content || "",
        nonLu: !email.isRead,
        categorie: categoriser(email.subject || "", email.bodyPreview || ""),
        resume: null
      }));

      tousEmails.sort((a, b) => priorite(a.categorie) - priorite(b.categorie));
      afficherInterface();

    } catch (err) {
      document.getElementById("app").innerHTML = `
        <div class="loading-box">❌ Erreur : ${err.message}</div>`;
    }
  }

  function afficherInterface() {
    const critique = tousEmails.filter(e => e.categorie === "critique").length;
    const assurance = tousEmails.filter(e => e.categorie === "assurance").length;
    const reunion = tousEmails.filter(e => e.categorie === "reunion").length;

    document.getElementById("app").innerHTML = `
      <div class="stats">
        <div class="stat-card"><div class="stat-num num-total">${tousEmails.length}</div><div class="stat-label">Total emails</div></div>
        <div class="stat-card"><div class="stat-num num-critique">${critique}</div><div class="stat-label">Critiques</div></div>
        <div class="stat-card"><div class="stat-num num-assurance">${assurance}</div><div class="stat-label">Assurance</div></div>
        <div class="stat-card"><div class="stat-num num-reunion">${reunion}</div><div class="stat-label">Réunions</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="filtrer('tous', this)">Tous</button>
        <button class="filter-btn" onclick="filtrer('critique', this)">🔴 Critiques</button>
        <button class="filter-btn" onclick="filtrer('assurance', this)">🟠 Assurance</button>
        <button class="filter-btn" onclick="filtrer('reunion', this)">🟢 Réunions</button>
        <button class="filter-btn" onclick="filtrer('invitation', this)">🟣 Invitations</button>
        <button class="filter-btn" onclick="filtrer('information', this)">🔵 Info</button>
      </div>
      <div class="email-list" id="email-list"></div>
    `;
    afficherEmails(tousEmails);
  }

  function afficherEmails(emails) {
    const liste = document.getElementById("email-list");
    if (!liste) return;
    liste.innerHTML = emails.map((e, i) => `
      <div class="email-card ${e.categorie}" onclick="toggleResume(${i})">
        <div class="card-top">
          <span class="cat-badge badge-${e.categorie}">${e.categorie}</span>
          <span class="email-subject">${e.nonLu ? "● " : ""}${e.sujet}</span>
          <span class="email-time">${formaterDate(e.date)}</span>
        </div>
        <div class="email-from">De : ${e.de} &lt;${e.deEmail}&gt;</div>
        <div class="email-preview">${e.apercu}</div>
        <div class="resume-box" id="resume-${i}">
          <div class="resume-title">✨ Résumé IA</div>
          <div class="resume-text" id="resume-text-${i}">
            <div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0"></div>
          </div>
        </div>
      </div>
    `).join("");
  }

  async function toggleResume(index) {
    const box = document.getElementById(`resume-${index}`);
    box.classList.toggle("visible");
    if (box.classList.contains("visible") && !tousEmails[index].resume) {
      const resume = await genererResume(tousEmails[index]);
      tousEmails[index].resume = resume;
      document.getElementById(`resume-text-${index}`).innerHTML = resume;
    }
  }

  async function genererResume(email) {
    try {
      const response = await fetch("https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages/" + email.id + "?$select=body", {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const data = await response.json();
      const corps = data.body?.content?.replace(/<[^>]*>/g, "").substring(0, 800) || email.apercu;

      return `
        <p><strong>De :</strong> ${email.de}</p>
        <p><strong>Catégorie :</strong> ${email.categorie}</p>
        <p><strong>Aperçu :</strong> ${corps}</p>
        <div class="resume-tags">
          <span class="resume-tag">${email.categorie}</span>
          ${email.nonLu ? '<span class="resume-tag">Non lu</span>' : '<span class="resume-tag">Lu</span>'}
        </div>
      `;
    } catch {
      return email.apercu;
    }
  }

  function filtrer(cat, btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filtered = cat === "tous" ? tousEmails : tousEmails.filter(e => e.categorie === cat);
    afficherEmails(filtered);
  }

  function formaterDate(date) {
    const now = new Date();
    const diff = now - date;
    if (diff < 3600000) return `il y a ${Math.floor(diff/60000)} min`;
    if (diff < 86400000) return `il y a ${Math.floor(diff/3600000)}h`;
    return date.toLocaleDateString("fr-FR");
  }

  window.onload = () => {
    const token = extraireToken();
    if (token) {
      accessToken = token;
      window.history.replaceState({}, document.title, window.location.pathname);
      document.getElementById("header-right").innerHTML = `<span class="user-badge">✅ Connecté</span>`;
      chargerEmails();
    }
  };
</script>

</body>
</html>
