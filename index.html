<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Email Dashboard IA – Thai Union</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1117; color: #fff; min-height: 100vh; }
    .header { background: #1a1a2e; padding: 20px 30px; border-bottom: 1px solid #2a2a4a; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 12px; color: #888; margin-top: 2px; }
    .stats { display: flex; gap: 12px; padding: 20px 30px; }
    .stat-card { background: #1a1a2e; border-radius: 12px; padding: 16px 20px; flex: 1; border: 1px solid #2a2a4a; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
    .filters { padding: 0 30px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #2a2a4a; background: #1a1a2e; color: #aaa; cursor: pointer; font-size: 13px; }
    .filter-btn.active { background: #0078d4; color: white; border-color: #0078d4; }
    .email-list { padding: 0 30px 30px; display: flex; flex-direction: column; gap: 10px; }
    .email-card { background: #1a1a2e; border-radius: 12px; padding: 16px 20px; border: 1px solid #2a2a4a; border-left: 4px solid #2a2a4a; transition: all 0.2s; cursor: pointer; }
    .email-card:hover { transform: translateX(3px); border-color: #4fc3f7; }
    .email-card.critique { border-left-color: #ef5350; }
    .email-card.assurance { border-left-color: #ff9800; }
    .email-card.sinistre { border-left-color: #ff5722; }
    .email-card.reunion { border-left-color: #66bb6a; }
    .email-card.information { border-left-color: #4fc3f7; }
    .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .cat-badge { padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-critique { background: #3a1a1a; color: #ef5350; }
    .badge-assurance { background: #3a2a1a; color: #ff9800; }
    .badge-sinistre { background: #3a1a0a; color: #ff5722; }
    .badge-reunion { background: #1a3a1a; color: #66bb6a; }
    .badge-information { background: #1a2a3a; color: #4fc3f7; }
    .badge-autre { background: #2a2a2a; color: #aaa; }
    .email-subject { font-size: 15px; font-weight: 600; flex: 1; }
    .email-from { font-size: 12px; color: #888; margin-bottom: 8px; }
    .resume-box { margin-top: 10px; background: #0f1117; border-radius: 8px; padding: 14px; border: 1px solid #2a2a4a; display: none; }
    .resume-box.visible { display: block; }
    .resume-title { font-size: 12px; color: #4fc3f7; font-weight: 600; margin-bottom: 8px; }
    .resume-text { font-size: 13px; color: #ccc; line-height: 1.8; white-space: pre-line; }
    .loading-box { text-align: center; padding: 60px; color: #666; font-size: 16px; }
    .refresh-btn { position: fixed; bottom: 30px; right: 30px; background: #0078d4; color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .refresh-btn:hover { background: #006cbd; }
    .last-update { font-size: 11px; color: #666; padding: 0 30px 10px; }
  </style>
</head>
<body>

<div class="header">
  <h1>📧 Email Dashboard IA – Thai Union</h1>
  <p>Analyse automatique par IA – mis à jour en temps réel</p>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-num" style="color:#4fc3f7" id="total">-</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num" style="color:#ef5350" id="critique">-</div><div class="stat-label">Critiques</div></div>
  <div class="stat-card"><div class="stat-num" style="color:#ff5722" id="sinistre">-</div><div class="stat-label">Sinistres</div></div>
  <div class="stat-card"><div class="stat-num" style="color:#ff9800" id="assurance">-</div><div class="stat-label">Assurance</div></div>
</div>

<div class="last-update" id="last-update"></div>

<div class="filters">
  <button class="filter-btn active" onclick="filtrer('tous', this)">Tous</button>
  <button class="filter-btn" onclick="filtrer('critique', this)">🔴 Critiques</button>
  <button class="filter-btn" onclick="filtrer('sinistre', this)">🟠 Sinistres</button>
  <button class="filter-btn" onclick="filtrer('assurance', this)">🟡 Assurance</button>
  <button class="filter-btn" onclick="filtrer('reunion', this)">🟢 Réunions</button>
  <button class="filter-btn" onclick="filtrer('information', this)">🔵 Info</button>
</div>

<div class="email-list" id="email-list">
  <div class="loading-box">⏳ Chargement des emails...</div>
</div>

<button class="refresh-btn" onclick="chargerEmails()">🔄 Actualiser</button>

<script>
  let tousEmails = [];

  function categoriser(texte) {
    const t = texte.toLowerCase();
    if (t.includes('sinistre') || t.includes('claim') || t.includes('accident') || t.includes('incident')) return 'sinistre';
    if (t.includes('urgent') || t.includes('critique') || t.includes('immédiat') || t.includes('priorité')) return 'critique';
    if (t.includes('contrat') || t.includes('assurance') || t.includes('couverture') || t.includes('police')) return 'assurance';
    if (t.includes('réunion') || t.includes('meeting') || t.includes('appel') || t.includes('call')) return 'reunion';
    return 'information';
  }

  async function chargerEmails() {
    document.getElementById('email-list').innerHTML = '<div class="loading-box">⏳ Chargement...</div>';
    try {
      const r = await fetch('https://raw.githubusercontent.com/MODIBO-web/email-dashboard/main/emails.json?t=' + Date.now());
      const data = await r.json();

      const contenu = atob(data.content.replace(/\n/g, ''));
      const email = JSON.parse(contenu);

      tousEmails = [email];
      tousEmails[0].categorie = categoriser(email.sujet + ' ' + email.resume);

      document.getElementById('last-update').textContent = '🕐 Dernier email : ' + email.sujet;
      mettreAJourStats();
      afficherEmails(tousEmails);
    } catch(e) {
      document.getElementById('email-list').innerHTML = '<div class="loading-box">❌ Erreur : ' + e.message + '</div>';
    }
  }

  function afficherEmails(emails) {
    const liste = document.getElementById('email-list');
    if (!emails.length) { liste.innerHTML = '<div class="loading-box">Aucun email.</div>'; return; }
    liste.innerHTML = emails.map((e, i) => `
      <div class="email-card ${e.categorie}" onclick="toggleResume(${i})">
        <div class="card-top">
          <span class="cat-badge badge-${e.categorie}">${e.categorie}</span>
          <span class="email-subject">${e.sujet || 'Sans sujet'}</span>
        </div>
        <div class="email-from">De : ${e.de || 'Inconnu'}</div>
        <div class="resume-box" id="resume-${i}">
          <div class="resume-title">✨ Résumé IA</div>
          <div class="resume-text">${e.resume || 'Pas de résumé'}</div>
        </div>
      </div>
    `).join('');
  }

  function toggleResume(i) {
    document.getElementById('resume-' + i).classList.toggle('visible');
  }

  function mettreAJourStats() {
    document.getElementById('total').textContent = tousEmails.length;
    document.getElementById('critique').textContent = tousEmails.filter(e => e.categorie === 'critique').length;
    document.getElementById('sinistre').textContent = tousEmails.filter(e => e.categorie === 'sinistre').length;
    document.getElementById('assurance').textContent = tousEmails.filter(e => e.categorie === 'assurance').length;
  }

  function filtrer(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    afficherEmails(cat === 'tous' ? tousEmails : tousEmails.filter(e => e.categorie === cat));
  }

  chargerEmails();
  setInterval(chargerEmails, 60000);
</script>
</body>
</html>
