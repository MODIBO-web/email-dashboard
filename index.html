<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Dashboard IA – Thai Union</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #070914;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: rgba(10, 13, 28, 0.95);
      backdrop-filter: blur(20px);
      padding: 16px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo-text h1 { font-size: 16px; font-weight: 700; color: #f1f5f9; }
    .logo-text p { font-size: 11px; color: #475569; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      padding: 5px 12px; border-radius: 20px;
    }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
    .live-text { font-size: 11px; color: #22c55e; font-weight: 500; }
    .last-update-header { font-size: 11px; color: #334155; }

    /* STATS */
    .stats-bar {
      display: flex; gap: 1px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .stat-item {
      flex: 1; padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
      background: #070914;
      transition: background 0.2s;
      cursor: default;
    }
    .stat-item:hover { background: rgba(255,255,255,0.02); }
    .stat-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .stat-info { min-width: 0; }
    .stat-num { font-size: 22px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 10px; color: #475569; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; }

    /* TOOLBAR */
    .toolbar {
      padding: 14px 32px;
      display: flex; gap: 10px; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: #070914;
    }
    .search-wrap { flex: 1; position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #334155; font-size: 14px; pointer-events: none; }
    .search-box {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 16px 10px 40px;
      color: #e2e8f0; font-size: 13px; outline: none;
      font-family: inherit;
      transition: all 0.2s;
    }
    .search-box::placeholder { color: #334155; }
    .search-box:focus { border-color: rgba(59,130,246,0.5); background: rgba(59,130,246,0.05); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

    /* FILTERS */
    .filters {
      padding: 12px 32px;
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: #070914;
    }
    .filter-label { font-size: 10px; color: #334155; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-right: 6px; }
    .filter-btn {
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: #475569;
      cursor: pointer; font-size: 12px; font-weight: 500;
      transition: all 0.15s; font-family: inherit;
      display: flex; align-items: center; gap: 5px;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.05); color: #94a3b8; border-color: rgba(255,255,255,0.12); }
    .filter-btn.active { background: #1e40af; color: #bfdbfe; border-color: #3b82f6; }

    /* ACTION BAR */
    .action-bar {
      padding: 8px 32px;
      display: flex; justify-content: space-between; align-items: center;
      background: #070914;
    }
    .result-count { font-size: 11px; color: #334155; font-weight: 500; }
    .close-all-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.08);
      color: #475569; padding: 5px 12px; border-radius: 7px;
      cursor: pointer; font-size: 11px; font-weight: 500;
      transition: all 0.15s; font-family: inherit;
    }
    .close-all-btn:hover { border-color: rgba(239,68,68,0.4); color: #ef4444; background: rgba(239,68,68,0.05); }

    /* EMAIL LIST */
    .email-list { padding: 12px 32px 80px; display: flex; flex-direction: column; gap: 6px; }

    /* EMAIL CARD */
    .email-card {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      border-left: 3px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
      overflow: hidden;
    }
    .email-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
    .email-card.open { border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.03); }
    .email-card.critique { border-left-color: #ef4444; }
    .email-card.assurance { border-left-color: #f97316; }
    .email-card.sinistre { border-left-color: #f59e0b; }
    .email-card.reunion { border-left-color: #22c55e; }
    .email-card.information { border-left-color: #3b82f6; }
